<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/pages.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
    <title>Compétences</title>
</head>
<body>
    <h1>Mes compétences</h1>
    <p>Découvrez ici mes diverses compétences, ainsi que la frise chronologique associée.</p>

    <div class="bulle bulle_up" src="/assets/bulle2.png">
        <div class="logo_position">
            <img class="html_logo" src="/assets/html-logo.png" alt="logo HTML"/>
            <img class="css_logo" src="/assets/css3-logo.png" alt="logo CSS"/>
        </div>
        <p class="timeline_up_p">2013-2014</p>
    </div>
    
    <div class="bulle bulle_up" src="/assets/bulle2.png">
        <div class="logo_position">
            <img class="python_logo" src="/assets/Python-Symbol.png" alt="logo python"/>
        </div>
        <p class="timeline_up_p">03/2026</p>
    </div>

    <hr></hr>
    <img class="timeline_arrow" src="/assets/timeline_arrow.png" alt="pointe de la frise chronologique"/>

    <div class="bulle bulle_down" src="/assets/bulle2.png">
        <p class="timeline_down_p">02/2026</p>
        <div class="down_logo_position">
            <img class="js_logo" src="/assets/JavaScript-Logo.png" alt="logo javascript"/>
        </div>
    </div>

    <div class="bulle bulle_down" src="/assets/bulle2.png">
        <p class="timeline_down_p">05/2026</p>
        <div class="down_logo_position">
            <img class="php_logo" src="/assets/php_PNG35.png" alt="logo php"/>
        </div>
    </div>
</body>
</html>
